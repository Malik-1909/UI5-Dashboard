project.techTitle=Technologie & Umsetzung
project.techIntro=Das Dashboard ist als lern- und portfolio-taugliche SAPUI5-App gebaut: ein Frontend für fünf Geschäftsprozesse, ein gemeinsames Datenmodell und je nach Umgebung Mock-, Sandbox- oder Live-Anbindung. Der Fokus liegt auf nachvollziehbarer Architektur statt auf Enterprise-Komplexität.
project.techUi5Title=SAPUI5 1.120 – App-Shell
project.techUi5Info=Single-Page-App mit XML-Views, JS-Controllern und sap.m-Routing. Horizon Theme, responsives Layout (CSS Grid + SCSS). Startseite, fünf Prozess-Detailseiten und Projektseite als eigene Routes.
project.techVizTitle=sap.viz – Diagramme
project.techVizInfo=VizFrame auf Kacheln (Mini-Charts) und Detailseiten (KPI-Tabelle + mehrere Diagramme). Gleiche Kennzahlen, unterschiedliche Darstellung – Balken, Kreis, Donut, Linie je nach Prozess.
project.techModelTitle=JSONModel „sales“ – ein Datenherz
project.techModelInfo=Alle KPIs und Charts lesen aus einem zentralen Modell. Lokal: Mock-Bundle sofort, danach optional Merge mit SAP-Sandbox. GitHub Pages: nur Mock. Badge in der UI zeigt SAP API vs. Mock.
project.techDataTitle=SapDataLoader – Sandbox-Anbindung
project.techDataInfo=Lädt parallel OData aus der SAP API Business Hub Sandbox (L2C, S2P, R2R, RtR, D2O), transformiert in die gleiche Struktur wie die Mock-JSONs. Views bleiben unverändert – nur die Datenquelle wechselt.
project.techProxyTitle=Custom Middleware – Chat & SAP-Proxy
project.techProxyInfo=UI5-Dev-Server und BTP-Node-Backend: /api/chat (Groq) und /api/sap/* (Sandbox). API-Keys bleiben serverseitig in .env, nicht im Browser.
project.techAiTitle=KI-Assistent – kontextbewusst
project.techAiInfo=Bekommt aktuelle Seite und KPI-Slice als Kontext. Erklärt Prozesse und Zahlen, navigiert nur bei explizitem Wunsch (z. B. „Navigiere zu R2R“). GitHub Pages: Offline-Regeln ohne API-Key.
project.techI18nTitle=i18n – Texte zentral
project.techI18nInfo=Alle sichtbaren UI-Texte in i18n.properties, Views binden mit {i18n>...}. Einheitlich Deutsch, eine Pflegestelle für Labels, Menüs und Hinweise.

project.implTitle=Wie das Projekt gedacht ist
project.implIntro=Die App soll zeigen, wie man mit überschaubarem Aufwand ein KPI-Dashboard baut, das sich wie eine echte SAP-Fiori-Demo anfühlt – ohne separates Backend pro Prozess.
project.implGoalTitle=Ziel
project.implGoalInfo=Fünf End-to-End-Prozesse verständlich machen: vom Überblick auf der Startseite bis zu Kennzahlen und Diagrammen auf den Detailseiten. Für Besucher, Recruiter und zum eigenen Üben.
project.implDataTitle=Datenstrategie
project.implDataInfo=Mock-Daten garantieren, dass die Demo immer läuft. Mit SAP_API_KEY werden echte Sandbox-Werte eingemischt – sichtbar am Badge. Kein zweites Datenmodell, keine View-Anpassung pro Quelle.
project.implDeployTitle=Deployment ohne Fork
project.implDeployInfo=Derselbe webapp/-Code läuft lokal, auf GitHub Pages (statisch) und auf BTP (mit Node-Proxy). Component.js erkennt die Umgebung und schaltet Datenquelle, Chat und BTP-Hinweis passend um.
project.implLearnTitle=Was man hier mitnehmen kann
project.implLearnInfo=SAPUI5-Routing, zentrales JSONModel, VizFrame-Integration, i18n, Custom Middleware, CI/CD (GitHub Actions), Cloud-Foundry-Deploy und pragmatische Trial-Workarounds (Keep-Alive).

