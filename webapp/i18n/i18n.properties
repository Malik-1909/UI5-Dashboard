project.title=KPI Dashboard - Geschäftsprozesse
project.intro1=Dieses Projekt ist ein SAPUI5-Dashboard, das fünf typische SAP End-to-End-Geschäftsprozesse als KPI-Übersicht darstellt. Auf der Startseite sieht man fünf Kacheln mit Mini-Diagrammen; jede Kachel führt zu einer Detailseite mit Kennzahlen-Tabelle und weiteren Charts. Ein integrierter KI-Assistent erklärt Prozesse und Zahlen und kann bei Bedarf durch die App navigieren.
project.whatTitle=Was die App macht
project.whatBody=Im Zentrum steht ein gemeinsames Datenmodell („sales“): Alle Kacheln, Tabellen und Diagramme lesen dieselben KPIs. Je nach Umgebung kommen die Werte aus Mock-JSONs, aus der SAP API Business Hub Sandbox oder aus einer Mischung beider Quellen. Ein Badge auf den Detailseiten zeigt an, ob gerade echte Sandbox-Daten oder Demo-Mock-Daten angezeigt werden. So bleibt die Demo immer lauffähig, kann aber mit API-Key echte Werte einblenden.
project.processesTitle=Die fünf Geschäftsprozesse
project.processesIntro=Dieses Dashboard bildet fünf Geschäftsprozesse ab. Auf den Detailseiten geht es um Kennzahlen und Visualisierung, nicht um vollständige Prozessmodellierung.
project.rtrNarrative=Recruit to Retire umfasst den gesamten Mitarbeiterlebenszyklus: von der Stellenausschreibung über Einarbeitung und Entwicklung bis zum Austritt. In der App lassen sich typische HR-Kennzahlen als Übersicht und in Diagrammen abrufen.
project.r2rNarrative=Record to Report deckt Finanz- und Rechnungswesen ab – Buchungen, Abschlüsse, Konsolidierung und Berichtswesen. Die Detailseite zeigt Finanz-KPIs und passende Chart-Typen für Kontenklassen und Anteile.
project.s2pNarrative=Source to Pay beschreibt den Einkauf: Bedarf, Bestellung, Wareneingang, Rechnungsprüfung und Zahlung. Hier werden unter anderem Bestellungen je Monat und Organisation dargestellt; die Sandbox liefert teils nur Beleganzahlen statt Nettobeträge.
project.d2oNarrative=Design to Operate verbindet Produktentwicklung, Fertigung und Betrieb – von Konstruktion über Beschaffung und Fertigung bis zu Auslieferung, Betrieb und Service. In der Demo fließen u. a. Warenbewegungen und Lagerbestände aus der Sandbox ein.
project.l2cNarrative=Lead to Cash ist der klassische Vertriebsprozess: vom Interessenten über Angebot und Auftrag bis zu Lieferung, Rechnung und Zahlungseingang. Die Kachel und Detailseite fokussieren auf Vertriebs- und Forderungs-KPIs.
project.hostingTitle=Hosting und Demo-Betrieb
project.hostingBody=Lokal startet man mit npm run start die volle Funktion: Mock-Daten sofort sichtbar, optional Merge mit der SAP-Sandbox über einen API-Key, und der KI-Assistent über Groq. Auf GitHub Pages läuft eine statische öffentliche Demo mit Mock-Daten und Offline-Chat-Simulation – ohne API-Keys im Browser. Auf SAP BTP (Cloud Foundry) hängt ein kleines Node-Backend für den KI-Chat und die SAP-Daten; dort ist die Live-Demo mit echten Werten und KI erreichbar (zum SAP-Weg siehe unten).
project.sapProxyTitle=SAP-Zugriff: Proxy, Egress-Sperre und Cache-Lösung
project.sapProxyBody=Der SAP-Zugriff läuft nie direkt aus dem Browser, sondern über einen serverseitigen Proxy: Das Frontend fragt nur die eigene App an, der API-Key bleibt serverseitig und CORS entfällt. Auf dem BTP Trial gab es dabei ein handfestes Problem – die Live-Demo lud endlos, weil der Proxy von der SAP-Sandbox nur Verbindungs-Timeouts (502) bekam. Ein temporärer Diagnose-Endpoint im Container hat die Ursache belegt: DNS war auflösbar, aber der reine TCP-Connect zur Sandbox-IP lief in den Timeout, während andere Dienste (z. B. Groq) erreichbar blieben – der Trial-Egress blockt also gezielt den Weg zur Sandbox. Gelöst habe ich das, indem eine GitHub Action die Sandbox stündlich dort abfragt, wo der Egress offen ist, und das Ergebnis als Cache-JSON bereitstellt. Der BTP-Server liefert daraus über die Route /api/sap-cache echte SAP-Werte (mit kurzem In-Memory-Cache und stale-while-error), und der Loader schaltet auf BTP automatisch auf diese Route um. So bleibt die Demo mit echten Daten live – ohne kostenpflichtige Destination und ohne dass sie bei einem Sandbox-Hänger stehen bleibt.
project.keepaliveBody=Im BTP Trial stoppt SAP Anwendungen oft automatisch (z. B. nachts). Statt Pay-as-you-go nutzt dieses Projekt eine GitHub Action, die stündlich /health prüft und die App bei Bedarf per cf start wieder hochfährt.
project.techTitle=Technologie und Umsetzung
project.techBody1=Frontend: SAPUI5 1.120 als Single-Page-App mit XML-Views, JS-Controllern und sap.m-Routing. Horizon Theme, responsives Layout mit CSS Grid und SCSS. Diagramme über sap.viz (VizFrame) auf Kacheln und Detailseiten – Balken, Kreis, Donut oder Linie je nach Prozess. Texte zentral in i18n.properties, einheitlich Deutsch.
project.techBody2=Daten und Backend: SapDataLoader holt parallel OData aus der Sandbox und mappt sie auf dieselbe JSON-Struktur wie die Mock-Dateien – Views bleiben unverändert. Custom Middleware (lokal und auf BTP) stellt /api/chat und /api/sap/* bereit, auf BTP zusätzlich /api/sap-cache für den GitHub-Cache; API-Keys liegen serverseitig in .env. Der KI-Assistent bekommt Seite und KPI-Kontext mit und navigiert nur bei explizitem Wunsch (z. B. „Navigiere zu R2R“).
project.featuresTitle=Funktionen im Überblick
project.featuresBody=Startseite mit fünf Prozesskacheln und Mini-Charts, Detailseiten mit KPI-Tabelle und mehreren Diagrammen, Navigation über Kacheln, Burger-Menü, KI-Button und Zurück, responsives Layout von Desktop bis Mobile, Datenquellen-Badge (SAP API vs. Mock), BTP-Offline-Hinweis auf GitHub Pages und Keep-Alive für die Trial-Demo.
project.privacyTitle=Datenschutz
project.privacyBody=Diese Demo erfasst beim Öffnen eines geteilten Links eine minimale Zugriffsmeldung: ein selbst vergebenes Kürzel aus dem Link (Parameter „ref“) und den Zeitpunkt. Damit wird ausschließlich die Reichweite geteilter Links gemessen. Es werden keine Cookies gesetzt, keine IP-Adressen gespeichert, nichts auf dem Endgerät abgelegt und keine personenbezogenen Profile gebildet. Ohne „ref“ im Link wird gar nichts erfasst. Die Daten werden in einer Datenbank innerhalb der EU gespeichert (Supabase, Region Frankfurt). Rechtsgrundlage ist das berechtigte Interesse an einer einfachen Reichweitenmessung (Art. 6 Abs. 1 lit. f DSGVO). Kontakt für Datenschutzanfragen: über das unten verlinkte GitHub-Profil.
